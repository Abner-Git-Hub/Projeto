<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat em Tempo Real</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .chat-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .login-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .login-screen h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .login-screen input {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .login-screen input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-screen button {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-screen button:hover {
            transform: scale(1.05);
        }

        .chat-screen {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.own {
            align-items: flex-end;
        }

        .message-header {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .message-content {
            background: white;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 70%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message.own .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .message-input-container input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .message-input-container input:focus {
            outline: none;
            border-color: #667eea;
        }

        .message-input-container button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .message-input-container button:hover {
            transform: scale(1.05);
        }

        .online-users {
            padding: 10px 20px;
            background: #f0f0f0;
            font-size: 14px;
            color: #666;
            border-bottom: 1px solid #e0e0e0;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>💬 Chat em Tempo Real</h1>
            <p>Abra múltiplas abas para testar a comunicação!</p>
        </div>

        <div class="login-screen" id="loginScreen">
            <h2>Entre no Chat</h2>
            <input type="text" id="usernameInput" placeholder="Digite seu nome de usuário" maxlength="20">
            <button onclick="joinChat()">Entrar</button>
        </div>

        <div class="chat-screen" id="chatScreen">
            <div class="online-users">
                Usuário: <strong id="currentUsername"></strong> | <span id="onlineCount">1</span> online
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="message-input-container">
                <input type="text" id="messageInput" placeholder="Digite sua mensagem..." maxlength="500">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        // Estado da aplicação
        let currentUser = null;
        const channel = new BroadcastChannel('chat_channel');
        
        // Carregar mensagens do localStorage
        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
            messages.forEach(msg => displayMessage(msg, false));
        }

        // Salvar mensagem no localStorage
        function saveMessage(message) {
            const messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
            messages.push(message);
            // Manter apenas as últimas 100 mensagens
            if (messages.length > 100) {
                messages.shift();
            }
            localStorage.setItem('chat_messages', JSON.stringify(messages));
        }

        // Exibir mensagem na tela
        function displayMessage(message, animate = true) {
            const container = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${message.username === currentUser ? 'own' : ''}`;
            
            const time = new Date(message.timestamp).toLocaleTimeString('pt-BR', {
                hour: '2-digit',
                minute: '2-digit'
            });

            messageDiv.innerHTML = `
                <div class="message-header">${message.username} • ${time}</div>
                <div class="message-content">${escapeHtml(message.message)}</div>
            `;

            if (animate) {
                messageDiv.style.animation = 'fadeIn 0.3s ease-in';
            }

            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        // Escapar HTML para prevenir XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Entrar no chat
        function joinChat() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                alert('Por favor, digite um nome de usuário');
                return;
            }

            currentUser = username;
            document.getElementById('currentUsername').textContent = username;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatScreen').style.display = 'flex';

            // Carregar mensagens anteriores
            loadMessages();

            // Notificar outros usuários
            channel.postMessage({
                type: 'user_joined',
                username: username
            });

            // Atualizar contador online
            updateOnlineCount(1);

            // Focar no input de mensagem
            document.getElementById('messageInput').focus();
        }

        // Enviar mensagem
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;

            const messageData = {
                id: Date.now(),
                username: currentUser,
                message: message,
                timestamp: new Date().toISOString()
            };

            // Salvar e exibir
            saveMessage(messageData);
            displayMessage(messageData);

            // Enviar para outras abas
            channel.postMessage({
                type: 'new_message',
                message: messageData
            });

            input.value = '';
            input.focus();
        }

        // Atualizar contador de usuários online
        function updateOnlineCount(change) {
            const countEl = document.getElementById('onlineCount');
            let count = parseInt(countEl.textContent) + change;
            countEl.textContent = Math.max(1, count);
        }

        // Escutar mensagens do BroadcastChannel
        channel.onmessage = (event) => {
            const data = event.data;

            if (data.type === 'new_message') {
                saveMessage(data.message);
                displayMessage(data.message);
            } else if (data.type === 'user_joined') {
                updateOnlineCount(1);
                const notification = document.createElement('div');
                notification.style.cssText = 'text-align: center; color: #666; padding: 10px; font-size: 14px;';
                notification.textContent = `${data.username} entrou no chat`;
                document.getElementById('messagesContainer').appendChild(notification);
            }
        };

        // Enviar mensagem com Enter
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Entrar com Enter no login
        document.getElementById('usernameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                joinChat();
            }
        });

        // Adicionar animação CSS
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
