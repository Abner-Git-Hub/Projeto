<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat em Tempo Real</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .chat-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .login-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .login-screen h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .login-screen input {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .login-screen input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-screen button {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-screen button:hover {
            transform: scale(1.05);
        }

        .chat-screen {
            display: none;
            flex: 1;
            flex-direction: column;
            min-height: 0;
        }

        .messages-container {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
            background: #f5f5f5;
            scroll-behavior: smooth;
        }

        .message-input-container {
            position: sticky;
            bottom: 0;
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            z-index: 2;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.own {
            align-items: flex-end;
        }

        .message-header {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .message-content {
            background: white;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 70%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message.own .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .message-input-container input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .message-input-container input:focus {
            outline: none;
            border-color: #667eea;
        }

        .message-input-container button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .message-input-container button:hover {
            transform: scale(1.05);
        }

        .online-users {
            padding: 10px 20px;
            background: #f0f0f0;
            font-size: 14px;
            color: #666;
            border-bottom: 1px solid #e0e0e0;
        }

        .connection-status {
            padding: 10px 20px;
            background: #fff3cd;
            color: #856404;
            font-size: 14px;
            text-align: center;
            border-bottom: 1px solid #ffeeba;
        }

        .connection-status.connected {
            background: #d4edda;
            color: #155724;
            border-bottom-color: #c3e6cb;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1> Chat em Tempo Real</h1>
           
        </div>

        <div class="connection-status" id="connectionStatus">
            ⚠️ Desconectado do servidor
        </div>

        <div class="login-screen" id="loginScreen">
            <h2>Entre no Chat</h2>
            <input type="text" id="usernameInput" placeholder="Digite seu nome de usuário" maxlength="20">
            <button onclick="joinChat()">Entrar</button>
        </div>

        <div class="chat-screen" id="chatScreen">
            <div class="online-users">
                Usuário: <strong id="currentUsername"></strong> | <span id="onlineCount">0</span> online
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="message-input-container">
                <input type="text" id="messageInput" placeholder="Digite sua mensagem..." maxlength="500">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let currentUser = null;
        let onlineCount = 0;
        let serverBase = null;

        // Cálculo do endereço do servidor conforme o modo de abertura
        function getServerBase() {
            const protocol = window.location.protocol;
            const host = window.location.hostname;
            const port = window.location.port || '3001';
            if (protocol === 'file:') {
                return 'http://localhost:3001';
            }
            return `${protocol}//${host}${port ? `:${port}` : ''}`;
        }

        // Conectar ao servidor Socket.io
        function connectToServer() {
            const serverUrl = serverBase || getServerBase();
            socket = io(serverUrl);

            socket.on('connect', () => {
                console.log('Conectado ao servidor');
                document.getElementById('connectionStatus').textContent = '✅ Conectado ao servidor';
                document.getElementById('connectionStatus').classList.add('connected');
            });

            socket.on('disconnect', () => {
                console.log('Desconectado do servidor');
                document.getElementById('connectionStatus').textContent = '⚠️ Desconectado do servidor';
                document.getElementById('connectionStatus').classList.remove('connected');
            });

            socket.on('message_history', (messages) => {
                messages.forEach(msg => displayMessage(msg, false));
            });

            socket.on('receive_message', (message) => {
                displayMessage(message);
            });

            socket.on('user_count', (count) => {
                onlineCount = count;
                document.getElementById('onlineCount').textContent = count;
            });

            socket.on('connect_error', (error) => {
                console.error('Erro de conexão:', error);
                document.getElementById('connectionStatus').textContent = '❌ Erro ao conectar: ' + error.message;
                document.getElementById('connectionStatus').classList.remove('connected');
            });
        }

        function loadSocketIoScript(callback) {
            const script = document.createElement('script');
            const scriptUrl = `${serverBase}/socket.io/socket.io.js`;
            script.src = scriptUrl;
            script.onload = callback;
            script.onerror = () => {
                document.getElementById('connectionStatus').textContent =
                    `❌ Não foi possível carregar o cliente socket.io em: ${scriptUrl}`;
            };
            document.head.appendChild(script);
        }

        // Exibir mensagem na tela
        function displayMessage(message, animate = true) {
            const container = document.getElementById('messagesContainer');
            const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 100;
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${message.username === currentUser ? 'own' : ''}`;
            
            const time = new Date(message.timestamp).toLocaleTimeString('pt-BR', {
                hour: '2-digit',
                minute: '2-digit'
            });

            messageDiv.innerHTML = `
                <div class="message-header">${message.username} • ${time}</div>
                <div class="message-content">${escapeHtml(message.message)}</div>
            `;

            if (animate) {
                messageDiv.style.animation = 'fadeIn 0.3s ease-in';
            }

            container.appendChild(messageDiv);

            if (wasAtBottom) {
                container.scrollTop = container.scrollHeight;
            }
        }

        // Escapar HTML para prevenir XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Entrar no chat
        function joinChat() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                alert('Por favor, digite um nome de usuário');
                return;
            }

            if (!socket || !socket.connected) {
                alert('Aguardando conexão com o servidor...');
                return;
            }

            currentUser = username;
            document.getElementById('currentUsername').textContent = username;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatScreen').style.display = 'flex';

            // Focar no input de mensagem
            document.getElementById('messageInput').focus();
        }

        // Enviar mensagem
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            if (!socket || !socket.connected) {
                alert('Não conectado ao servidor');
                return;
            }

            socket.emit('send_message', {
                username: currentUser,
                message: message
            });

            input.value = '';
            input.focus();
        }

        // Enviar mensagem com Enter
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Entrar com Enter no login
        document.getElementById('usernameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                joinChat();
            }
        });

        // Carregar Socket.io e iniciar conexão
        serverBase = getServerBase();
        loadSocketIoScript(connectToServer);

        // Adicionar animação CSS
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);

        // Registrar Service Worker para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((registration) => {
                        console.log('Service Worker registrado com sucesso:', registration);
                    })
                    .catch((error) => {
                        console.log('Falha ao registrar Service Worker:', error);
                    });
            });
        }
    </script>
</body>
</html>
